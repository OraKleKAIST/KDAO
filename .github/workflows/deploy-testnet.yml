name: Deploy (Testnet)

# CI 워크플로가 main 브랜치에서 성공적으로 완료된 후 자동으로 트리거됩니다.
# 실제 배포는 GitHub Settings → Environments → testnet 에서 설정한
# Required Reviewers의 승인 이후에만 실행됩니다.
#
# 필요한 GitHub Secrets:
#   SEPOLIA_RPC_URL       — Sepolia RPC 엔드포인트 (Alchemy/Infura 등)
#   DEPLOYER_PRIVATE_KEY  — 배포자 개인키 (0x 포함)
#   ETHERSCAN_API_KEY     — Etherscan 컨트랙트 검증용 API 키
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Sepolia
    runs-on: ubuntu-latest
    # CI가 성공한 경우에만 실행
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # testnet 환경 보호 규칙 적용 (GitHub Settings에서 Required Reviewers 설정)
    environment: testnet

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Simulate deployment before broadcast
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: |
          forge script script/DeployKDAO.s.sol \
            --rpc-url $SEPOLIA_RPC_URL \
            --sender ${{ secrets.DEPLOYER_ADDRESS }}

      - name: Deploy to Sepolia
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          forge script script/DeployKDAO.s.sol \
            --rpc-url $SEPOLIA_RPC_URL \
            --private-key $DEPLOYER_PRIVATE_KEY \
            --broadcast \
            --verify \
            --etherscan-api-key $ETHERSCAN_API_KEY
